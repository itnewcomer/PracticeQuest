name: Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Show available Xcode versions
        run: ls /Applications/ | grep Xcode

      - name: Select latest Xcode
        run: |
          XCODE=$(ls /Applications/ | grep "^Xcode" | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s /Applications/$XCODE/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Show available simulators
        run: xcrun simctl list devices available | grep iPhone | head -10

      - name: Run unit tests
        run: |
          SIM_ID=$(xcrun simctl list devices available | grep iPhone | head -1 | grep -oE '[A-F0-9-]{36}')
          echo "Using simulator: $SIM_ID"
          xcodebuild test \
            -project PracticeQuest.xcodeproj \
            -scheme PracticeQuest \
            -destination "id=$SIM_ID" \
            -only-testing:PracticeQuestTests \
            2>&1 | tee test_output.txt | grep -E "Test Case|passed|failed|error:"
          grep -q "TEST FAILED" test_output.txt && exit 1 || exit 0
